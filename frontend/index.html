<!DOCTYPE html>
<html>
<head>
  <title>Sarjy</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🤖 Sarjy</h2>

<div id="chat"></div>

<div class="controls">
  <input id="input" placeholder="Say something..." />
  <button onclick="sendMessage()">Send</button>
  <button onclick="startVoice()">🎤</button>
  <div id="lang-switch">
  <button onclick="setLanguage('en-US')">EN</button>
  <button onclick="setLanguage('ar-SA')">AR</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
